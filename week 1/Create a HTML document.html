<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Profile Links</title> 
<style> 
.profile-image { 
width: 150px; /* Set the width of the images */ 
height: 150px; /* Set the height of the images */ 
border-radius: 50%; /* Make the images circular */ 
display: block; /* Block display to apply margin */ 
margin: 20px auto; /* Center the images with margin */ 
} 
.profile-container { 
text-align: center; /* Center align the text */ 
margin-top: 50px; 
} 
</style> 
</head> 
<body> 
<div class="profile-container"> 
<a href="https://www.linkedin.com/in/williamhgates/" target="_blank"> 
<img src="https://www.w3schools.com/w3images/avatar2.png" alt="Your Profile 
Image" class="profile-image"> 
</a> 
<p>Your Profile</p> 
</div> 
<div class="profile-container"> 
<a href="https://www.example.com/friends-profile" target="_blank"> 
<img src="https://www.w3schools.com/w3images/avatar6.png" alt="Friend'
Profile Image" class="profile-image"> 
</a> 
<p>Friend's Profile</p> 
</div> 
</body> 
</html>
